name: Security checks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "51 9 * * 1"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit -r requirements.txt
      - run: python -m compileall -q .
